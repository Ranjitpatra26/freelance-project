<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg8)"/>

  <!-- Beetroot background -->
  <circle cx="250" cy="220" r="120" fill="#8B00FF" opacity="0.1"/>
  <circle cx="250" cy="220" r="95" fill="#C96AAA"/>

  <!-- Beetroot Chips -->
  <path d="M 170 150 Q 190 140 210 160 Q 200 180 180 170 Z" fill="#943D5A" transform="rotate(-30 190 160)"/>
  <path d="M 280 140 Q 300 130 320 150 Q 310 170 290 160 Z" fill="#B85C75" transform="rotate(25 300 150)"/>
  <path d="M 200 240 Q 220 230 240 250 Q 230 270 210 260 Z" fill="#7A2E4A" transform="rotate(-15 220 250)"/>
  <path d="M 280 260 Q 300 250 320 270 Q 310 290 290 280 Z" fill="#943D5A" transform="rotate(40 300 270)"/>
  <path d="M 240 180 Q 260 170 280 190 Q 270 210 250 200 Z" fill="#B85C75" transform="rotate(15 260 190)"/>

  <!-- Sparkle/shine for nutrients -->
  <circle cx="190" cy="170" r="4" fill="#FF69B4" opacity="0.5"/>
  <circle cx="260" cy="150" r="3" fill="#FF69B4" opacity="0.5"/>
  <circle cx="250" cy="250" r="4" fill="#FF69B4" opacity="0.5"/>
  <circle cx="290" cy="270" r="3" fill="#FF69B4" opacity="0.5"/>

  <!-- Label -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#475d2a">Beetroot Chips</text>
  <text x="250" y="410" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a6a4a">Antioxidant-Rich &amp; Colorful</text>

  <!-- Emoji -->
  <text x="250" y="480" font-size="40" text-anchor="middle">🍠</text>
</svg>
