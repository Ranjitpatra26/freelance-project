<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F5F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg3)"/>
  <circle cx="250" cy="220" r="120" fill="#76C893" opacity="0.15"/>
  <circle cx="250" cy="220" r="100" fill="#B5E7A0"/>

  <!-- Makhana pieces with mint tint -->
  <circle cx="200" cy="180" r="25" fill="#A8E6B8"/>
  <circle cx="280" cy="170" r="28" fill="#9FDD9F"/>
  <circle cx="250" cy="220" r="30" fill="#B5E7A0"/>
  <circle cx="220" cy="260" r="26" fill="#A8E6B8"/>
  <circle cx="290" cy="250" r="24" fill="#B5E7A0"/>
  <circle cx="250" cy="140" r="22" fill="#9FDD9F"/>

  <!-- Mint leaves accent -->
  <ellipse cx="150" cy="150" rx="20" ry="30" fill="#76C893" opacity="0.6" transform="rotate(-45 150 150)"/>
  <ellipse cx="340" cy="280" rx="20" ry="30" fill="#76C893" opacity="0.6" transform="rotate(25 340 280)"/>

  <!-- Mint texture lines -->
  <path d="M 200 160 Q 190 170 195 185" stroke="#76C893" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Label -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a3320">Pudina Makhana</text>
  <text x="250" y="410" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#475d2a">Mint Flavored Fox Nuts</text>

  <!-- Emoji -->
  <text x="250" y="480" font-size="40" text-anchor="middle">🌿</text>
</svg>
