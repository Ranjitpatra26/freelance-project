<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F5F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg9)"/>

  <!-- Cookie background -->
  <circle cx="250" cy="220" r="120" fill="#8B7355" opacity="0.1"/>
  <circle cx="250" cy="220" r="95" fill="#D4A574"/>

  <!-- Cookies -->
  <circle cx="180" cy="170" r="35" fill="#C9975E" stroke="#A0764A" stroke-width="2"/>
  <circle cx="280" cy="160" r="38" fill="#D4A574" stroke="#A0764A" stroke-width="2"/>
  <circle cx="240" cy="280" r="36" fill="#C9975E" stroke="#A0764A" stroke-width="2"/>
  <circle cx="150" cy="280" r="32" fill="#D4A574" stroke="#A0764A" stroke-width="2"/>

  <!-- Millet texture on cookies -->
  <circle cx="175" cy="165" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="190" cy="175" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="275" cy="155" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="290" cy="170" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="235" cy="275" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="250" cy="290" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="145" cy="275" r="2" fill="#8B7355" opacity="0.7"/>
  <circle cx="160" cy="290" r="2" fill="#8B7355" opacity="0.7"/>

  <!-- Coconut oil shine -->
  <ellipse cx="185" cy="160" rx="8" ry="6" fill="#FFE4B5" opacity="0.5"/>
  <ellipse cx="285" cy="150" rx="10" ry="7" fill="#FFE4B5" opacity="0.5"/>

  <!-- Label -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#475d2a">Millet Cookies</text>
  <text x="250" y="410" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a6a4a">No Sugar • No Palm Oil</text>

  <!-- Emoji -->
  <text x="250" y="480" font-size="40" text-anchor="middle">🍪</text>
</svg>
