<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg2)"/>
  <circle cx="250" cy="220" r="120" fill="#FF6B35" opacity="0.15"/>
  <circle cx="250" cy="220" r="100" fill="#FFD93D"/>

  <!-- Wayy chips -->
  <ellipse cx="200" cy="180" rx="35" ry="28" fill="#FFC93C" transform="rotate(-30 200 180)"/>
  <ellipse cx="280" cy="170" rx="40" ry="30" fill="#FFD93D" transform="rotate(25 280 170)"/>
  <ellipse cx="250" cy="260" rx="38" ry="32" fill="#FFC93C" transform="rotate(-15 250 260)"/>
  <ellipse cx="220" cy="220" rx="32" ry="26" fill="#FFE76D" transform="rotate(40 220 220)"/>

  <!-- Spice specks (Peri Peri) -->
  <circle cx="210" cy="200" r="4" fill="#FF6B35" opacity="0.7"/>
  <circle cx="250" cy="180" r="3" fill="#FF6B35" opacity="0.7"/>
  <circle cx="280" cy="220" r="3" fill="#FF6B35" opacity="0.7"/>
  <circle cx="230" cy="260" r="4" fill="#FF6B35" opacity="0.7"/>
  <circle cx="270" cy="250" r="3" fill="#FF6B35" opacity="0.7"/>

  <!-- Texture -->
  <path d="M 190 180 L 210 185" stroke="#E6B800" stroke-width="1" opacity="0.5"/>
  <path d="M 270 160 L 290 175" stroke="#E6B800" stroke-width="1" opacity="0.5"/>

  <!-- Label -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#475d2a">Peri Peri Makhana</text>
  <text x="250" y="410" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a6a4a">Spicy Fox Nuts</text>

  <!-- Emoji -->
  <text x="250" y="480" font-size="40" text-anchor="middle">🌶️</text>
</svg>
