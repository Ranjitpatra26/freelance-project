      <stop offset="0%" style="stop-color:#f0f4ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg4)"/>
  <circle cx="250" cy="220" r="120" fill="#FDB913" opacity="0.15"/>
  <circle cx="250" cy="220" r="100" fill="#FFD54F"/>

  <!-- Makhana pieces with cheese color -->
  <circle cx="200" cy="180" r="25" fill="#FFC107"/>
  <circle cx="280" cy="170" r="28" fill="#FFD54F"/>
