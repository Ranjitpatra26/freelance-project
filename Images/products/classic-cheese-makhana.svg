  <circle cx="210" cy="190" r="4" fill="#FDB913" opacity="0.6"/>
  <circle cx="235" cy="210" r="3" fill="#FDB913" opacity="0.6"/>
  <circle cx="270" cy="240" r="4" fill="#FDB913" opacity="0.6"/>
  <circle cx="245" cy="270" r="3" fill="#FDB913" opacity="0.6"/>
